services:
  db:
    image: ${DB_IMAGE:-docker.1ms.run/pgvector/pgvector:pg16}
    container_name: pharma-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pharma_alpha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-docker.1ms.run/library/node:20-slim}
    container_name: pharma-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: .env.production
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pharma_alpha?schema=public
      PLATFORM_API_BASE: http://localhost:3000/api
      RUN_PROJECT_FIRST_SEED: ${RUN_PROJECT_FIRST_SEED:-true}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - agent-logs:/app/agents/logs

volumes:
  pgdata:
  agent-logs:
