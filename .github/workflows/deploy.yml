name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_lint:
        description: "Skip lint checks (emergency hotfix)"
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────
  # Stage 1: Static checks (gate)
  # ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_lint }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npm run lint
      - run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────
  # Stage 2: Build the production image and push to Aliyun ACR
  # Runs on a GitHub-hosted runner (7 GB RAM, multi-core) — the production
  # server does NOT build. NODE_IMAGE is overridden to the Docker Hub
  # original because the runner is overseas and would be slower hitting
  # the China-only mirror baked into the Dockerfile default.
  # ────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [lint]
    if: ${{ always() && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          echo "image_tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tag with both the immutable SHA (for rollback) and `latest`
          # (so a manual `docker compose pull` always grabs the newest).
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/app:${{ steps.meta.outputs.image_tag }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/app:latest
          # Override the China-mirror default in the Dockerfile so the
          # GitHub-hosted runner pulls node:20-slim straight from Docker Hub.
          build-args: |
            NODE_IMAGE=node:20-slim
          # Cache build layers across runs to dramatically speed up subsequent builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────
  # Stage 3: SSH to the server, pull the new image, restart the stack.
  # No source code or Docker build happens on the server.
  # ────────────────────────────────────────────────────────────
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment:
      name: production
      url: ${{ vars.HEALTH_URL }}

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          ACR_REGISTRY_VPC: ${{ secrets.ACR_REGISTRY_VPC }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
        run: |
          # Heredoc is unquoted so the local env vars below are interpolated
          # before the script is sent to the server. Anything that should be
          # evaluated on the *remote* is escaped with \$.
          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" bash -se <<REMOTE
          set -euo pipefail

          DEPLOY_PATH="${DEPLOY_PATH:-/opt/pharma-alpha}"
          cd "\$DEPLOY_PATH"

          echo "==> Pulling latest deployment manifests ($GIT_BRANCH @ ${GIT_SHA:0:7})"
          git fetch --all --prune
          git reset --hard "origin/$GIT_BRANCH"

          if [ ! -f .env.production ]; then
            echo "ERROR: .env.production missing on server. Aborting." >&2
            exit 2
          fi

          # Variables needed by docker-compose.image.yml's \${VAR} interpolation.
          # docker compose only reads them from --env-file or the shell, never
          # from a service's env_file: block.
          export ACR_REGISTRY_VPC="$ACR_REGISTRY_VPC"
          export ACR_NAMESPACE="$ACR_NAMESPACE"
          export IMAGE_TAG="$IMAGE_TAG"

          echo "==> Pulling image ${ACR_REGISTRY_VPC}/${ACR_NAMESPACE}/app:${IMAGE_TAG}"
          docker compose \
            --env-file .env.production \
            -f docker-compose.yml \
            -f docker-compose.production.yml \
            -f docker-compose.image.yml \
            pull

          echo "==> Recreating containers"
          docker compose \
            --env-file .env.production \
            -f docker-compose.yml \
            -f docker-compose.production.yml \
            -f docker-compose.image.yml \
            up -d --remove-orphans

          echo "==> Pruning unused images (keep 2 most recent)"
          # Keep the previous image around so rollback via \`docker compose pull\` + tag swap is fast.
          docker image prune -f

          echo "==> Container status:"
          docker compose \
            --env-file .env.production \
            -f docker-compose.yml \
            -f docker-compose.production.yml \
            -f docker-compose.image.yml \
            ps
          REMOTE

      - name: Health check
        if: ${{ vars.HEALTH_URL != '' }}
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL }}
        run: |
          echo "Waiting for service at $HEALTH_URL ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$HEALTH_URL" || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "401" ]; then
              echo "Service healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "  attempt $i/30 → HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Service did not respond after 150s" >&2
          exit 1
