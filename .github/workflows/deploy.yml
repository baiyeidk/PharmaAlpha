name: Deploy to Production

on:
  push:
    branches: [main]
    # 不触发部署：文档、种子 SQL、规范文档、IDE 配置、本地 artifact。
    # 减少 ~30-40% 的无意义构建（runner 分钟 + ACR 流量）。
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "openspec/**"
      - "prisma/seeds/**"
      - ".cursor/**"
      - "artifacts/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "openspec/**"
      - "artifacts/**"
      - ".cursor/**"
  workflow_dispatch:
    inputs:
      skip_lint:
        description: "Skip lint checks (emergency hotfix)"
        type: boolean
        default: false

concurrency:
  # PR 之间互相 cancel，节省 runner 分钟；push main 用独立组不互踩。
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ────────────────────────────────────────────────────────────
  # Stage 1a: Static checks (gate)
  # lint 与 typecheck 并行跑，单 job 节省一次 runner 启动 + npm ci 时间。
  # ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_lint }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate

      - name: Lint & TypeCheck (parallel)
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1 &
          LINT_PID=$!
          npx tsc --noEmit > tsc.log 2>&1 &
          TSC_PID=$!

          wait $LINT_PID; LINT_EXIT=$?
          wait $TSC_PID;  TSC_EXIT=$?

          echo "──────── eslint ────────"
          cat lint.log
          echo "──────── tsc -noEmit ────────"
          cat tsc.log

          if [ $LINT_EXIT -ne 0 ] || [ $TSC_EXIT -ne 0 ]; then
            echo "::error::lint=$LINT_EXIT  tsc=$TSC_EXIT"
            exit 1
          fi

  # ────────────────────────────────────────────────────────────
  # Stage 1b: Vitest (TypeScript 单元测试)
  # 与 lint 并行执行，互不阻塞。
  # ────────────────────────────────────────────────────────────
  test-ts:
    name: Vitest
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_lint }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm test

  # ────────────────────────────────────────────────────────────
  # Stage 1c: pytest (Python agent 单元测试)
  # 测试不需要数据库或 LLM，全是纯逻辑/mock。
  # ────────────────────────────────────────────────────────────
  test-agents:
    name: Pytest (agents)
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_lint }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: agents/requirements.txt
      - name: Install agent deps + pytest
        run: |
          pip install -r agents/requirements.txt pytest
      - name: Run pytest
        working-directory: agents
        run: pytest tests/ -v

  # ────────────────────────────────────────────────────────────
  # Stage 1d: Migration smoke test
  # 在临时 pgvector container 上跑 prisma migrate deploy，
  # 防止"生产 migrate 才发现 schema 写错"。
  # ────────────────────────────────────────────────────────────
  test-migration:
    name: Migration Smoke Test
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_lint }}
    services:
      pg:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pharma_alpha_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pharma_alpha_ci?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - name: Enable pgvector extension
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d pharma_alpha_ci \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Apply migrations (prisma migrate deploy)
        run: npx prisma migrate deploy
      - name: Verify schema can be re-applied (idempotency)
        run: npx prisma migrate deploy

  # ────────────────────────────────────────────────────────────
  # Stage 2: Build the production image and push to Aliyun ACR
  # 只在 push main / 手动触发时执行，且 4 个 gate 全绿才放行。
  # PR 仅跑 gate，不烧 build/push 分钟。
  # ────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [lint, test-ts, test-agents, test-migration]
    if: |
      always()
      && (needs.lint.result == 'success' || needs.lint.result == 'skipped')
      && (needs.test-ts.result == 'success' || needs.test-ts.result == 'skipped')
      && (needs.test-agents.result == 'success' || needs.test-agents.result == 'skipped')
      && (needs.test-migration.result == 'success' || needs.test-migration.result == 'skipped')
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          echo "image_tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 同时打 SHA（回滚用）和 latest（手动 pull 用）两个 tag。
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/app:${{ steps.meta.outputs.image_tag }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/app:latest
          # 多阶段 Dockerfile 各 stage 共享层缓存。Buildx scope 拆分到 stage 级
          # 能让 prod-deps / python-venv 这种"几乎不变"的层稳定命中。
          build-args: |
            NODE_IMAGE=node:20-slim
          cache-from: type=gha,scope=buildx
          cache-to: type=gha,scope=buildx,mode=max,ignore-error=true
          provenance: false
          sbom: false

  # ────────────────────────────────────────────────────────────
  # Stage 3: SSH to the server, pull the new image, restart the stack.
  # ────────────────────────────────────────────────────────────
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: ${{ needs.build-and-push.result == 'success' }}
    environment:
      name: production
      url: ${{ vars.HEALTH_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      # 把 3 个 compose 文件 scp 到服务器（源码全部在镜像里，服务器只需 manifests）
      - name: Sync deploy manifests via scp
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/pharma-alpha}"
          scp -P "${SSH_PORT:-22}" \
            docker-compose.yml \
            docker-compose.production.yml \
            docker-compose.image.yml \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          ACR_REGISTRY_VPC: ${{ secrets.ACR_REGISTRY_VPC }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
        run: |
          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" bash -se <<REMOTE
          set -euo pipefail

          DEPLOY_PATH="${DEPLOY_PATH:-/opt/pharma-alpha}"
          cd "\$DEPLOY_PATH"

          echo "==> Deploying $GIT_BRANCH @ ${GIT_SHA:0:7} (image tag: $IMAGE_TAG)"

          if [ ! -f .env.production ]; then
            echo "ERROR: .env.production missing on server. Aborting." >&2
            exit 2
          fi

          export ACR_REGISTRY_VPC="$ACR_REGISTRY_VPC"
          export ACR_NAMESPACE="$ACR_NAMESPACE"
          export IMAGE_TAG="$IMAGE_TAG"

          echo "==> Pulling image ${ACR_REGISTRY_VPC}/${ACR_NAMESPACE}/app:${IMAGE_TAG}"
          docker compose \
            --env-file .env.production \
            -f docker-compose.yml \
            -f docker-compose.production.yml \
            -f docker-compose.image.yml \
            pull

          echo "==> Recreating containers"
          docker compose \
            --env-file .env.production \
            -f docker-compose.yml \
            -f docker-compose.production.yml \
            -f docker-compose.image.yml \
            up -d --remove-orphans

          echo "==> Pruning unused images"
          docker image prune -f

          echo "==> Container status:"
          docker compose \
            --env-file .env.production \
            -f docker-compose.yml \
            -f docker-compose.production.yml \
            -f docker-compose.image.yml \
            ps
          REMOTE

      - name: Health check
        if: ${{ vars.HEALTH_URL != '' }}
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL }}
        run: |
          echo "Waiting for service at $HEALTH_URL ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$HEALTH_URL" || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "401" ]; then
              echo "Service healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "  attempt $i/30 → HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Service did not respond after 150s" >&2
          exit 1
